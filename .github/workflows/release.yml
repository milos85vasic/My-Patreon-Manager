# .github/workflows/release.yml
# Manual-only: dispatched with a version input. No tag triggers.
# The workflow creates the tag itself once verification completes.
name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.2.0) — will be created as a signed tag"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tag
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git tag -a "$RELEASE_VERSION" -m "$RELEASE_VERSION"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_VERSION }}
