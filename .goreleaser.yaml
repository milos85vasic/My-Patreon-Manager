# .goreleaser.yaml
version: 2
before:
  hooks:
    - go mod tidy
builds:
  - id: patreon-manager
    main: ./cmd/cli
    binary: patreon-manager
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
  - id: patreon-manager-server
    main: ./cmd/server
    binary: patreon-manager-server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
signs:
  - artifacts: checksum
    cmd: cosign
    args: ["sign-blob", "--yes", "--output-signature=${signature}", "${artifact}"]
release:
  draft: false
  prerelease: auto
